[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"
watchPatterns = [
  "Cargo.toml",
  "Cargo.lock",
  "crates/**",
  "docs/**",
  "scripts/container-entrypoint.sh",
  "Dockerfile",
  "railway.toml",
]

[deploy]
healthcheckPath = "/healthz"
healthcheckTimeout = 120
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
